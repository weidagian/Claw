<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 子问设计助手</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>
                    <div class="logo-icon">Z</div>
                    子问设计助手
                </h1>
                <p>登录后享受更多免费次数</p>
            </div>
            
            <!-- 登录表单 -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn-submit">登录</button>
                <div class="auth-links">
                    <a href="register.html">还没有账号？立即注册</a>
                </div>
            </form>
            
            <div class="auth-footer">
                <a href="work-v3.html">暂不登录，先去体验 &gt;</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
