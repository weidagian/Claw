<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 子问设计助手</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">
                <i class="fas fa-home"></i>
            </div>
            <h1 class="logo-title">子问设计</h1>
            <p class="logo-subtitle">AI 智能室内设计</p>
        </div>

        <!-- 标签切换 -->
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">登录</button>
            <button class="tab-btn" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label for="loginUsername">
                    <i class="fas fa-user"></i>
                    <span>用户名</span>
                </label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">
                    <i class="fas fa-lock"></i>
                    <span>密码</span>
                </label>
                <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <div class="error-message" id="loginError" style="display: none;"></div>
            <button type="submit" class="btn-submit">
                <span>登录</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="registerUsername">
                    <i class="fas fa-user"></i>
                    <span>用户名</span>
                </label>
                <input type="text" id="registerUsername" placeholder="至少 3 位" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="registerPassword">
                    <i class="fas fa-lock"></i>
                    <span>密码</span>
                </label>
                <input type="password" id="registerPassword" placeholder="至少 6 位" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">
                    <i class="fas fa-lock"></i>
                    <span>确认密码</span>
                </label>
                <input type="password" id="confirmPassword" placeholder="再次输入密码" autocomplete="new-password">
            </div>
            <div class="error-message" id="registerError" style="display: none;"></div>
            <button type="submit" class="btn-submit">
                <span>注册</span>
                <i class="fas fa-user-plus"></i>
            </button>
        </form>

        <!-- 分割线 -->
        <div class="auth-divider">
            <span>或</span>
        </div>

        <!-- 访客体验 -->
        <a href="work.html?guest=1" class="btn-guest">
            <i class="fas fa-ghost"></i>
            <span>立即体验（无需登录）</span>
        </a>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/main.js"></script>
</body>
</html>
