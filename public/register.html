<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 子问设计助手</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>
                    <div class="logo-icon">Z</div>
                    子问设计助手
                </h1>
                <p>注册账号，获取更多免费次数</p>
            </div>
            
            <!-- 注册表单 -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-username">用户名</label>
                    <input type="text" id="reg-username" name="username" required placeholder="请输入用户名（4-20个字符）">
                </div>
                <div class="form-group">
                    <label for="reg-password">密码</label>
                    <input type="password" id="reg-password" name="password" required placeholder="请输入密码（至少6位）">
                </div>
                <div class="form-group">
                    <label for="reg-password2">确认密码</label>
                    <input type="password" id="reg-password2" name="password2" required placeholder="请再次输入密码">
                </div>
                <button type="submit" class="btn-submit">注册</button>
                <div class="auth-links">
                    <a href="login.html">已有账号？立即登录</a>
                </div>
            </form>
            
            <div class="auth-footer">
                <a href="work.html">暂不注册，先去体验 &gt;</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
