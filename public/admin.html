<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 子问设计助手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .admin-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: #fff;
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card h3 {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e293b;
        }
        .card {
            background: #fff;
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            font-weight: 600;
            color: #64748b;
            font-size: 0.875rem;
        }
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2563eb;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">Z</div>
                <span>子问设计助手</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">返回首页</a>
            </nav>
        </div>
    </header>

    <main class="admin-container" id="mainContent">
        <!-- 登录表单 -->
        <div class="login-box" id="loginForm">
            <h2 style="margin-bottom: 1.5rem;">管理员登录</h2>
            <div class="card">
                <div class="form-group" style="text-align: left;">
                    <label>管理员密码</label>
                    <input type="password" id="password" placeholder="请输入管理员密码">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="adminLogin()">登录</button>
                <p style="margin-top: 1rem; color: #94a3b8; font-size: 0.875rem;">
                    默认密码可在 data/settings.json 中配置
                </p>
            </div>
        </div>

        <!-- 管理内容 -->
        <div id="adminContent" style="display: none;">
            <div class="admin-header">
                <h1 class="admin-title">⚙️ 管理后台</h1>
                <div>
                    <button class="btn btn-secondary" onclick="loadData()">刷新</button>
                    <button class="btn btn-secondary" onclick="adminLogout()">退出</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>👥 用户总数</h3>
                    <div class="value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>🎨 今日生成</h3>
                    <div class="value" id="todayGenerations">0</div>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title">👥 用户列表</h3>
                <table>
                    <thead>
                        <tr>
                            <th>用户名</th>
                            <th>注册时间</th>
                            <th>最后登录</th>
                            <th>使用次数</th>
                        </tr>
                    </thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>

            <div class="card">
                <h3 class="card-title">🤖 模型管理</h3>
                <table>
                    <thead>
                        <tr>
                            <th>模型名称</th>
                            <th>Model ID</th>
                            <th>支持画质</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="modelTable"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function adminLogin() {
            const password = document.getElementById('password').value;

            if (password === 'admin2026') {
                localStorage.setItem('adminToken', 'admin_token');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else {
                alert('密码错误');
            }
        }

        function adminLogout() {
            localStorage.removeItem('adminToken');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }

        async function loadData() {
            const token = localStorage.getItem('adminToken');

            // 加载用户列表
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'X-Admin-Token': token }
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.users.length;
                    document.getElementById('userTable').innerHTML = data.users.map(u => `
                        <tr>
                            <td>${u.username}</td>
                            <td>${new Date(u.createdAt).toLocaleString()}</td>
                            <td>${new Date(u.lastLogin).toLocaleString()}</td>
                            <td>${u.usageCount}</td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('加载用户失败:', err);
            }

            // 加载模型列表
            try {
                const res = await fetch('/api/models');
                const data = await res.json();

                if (data.success) {
                    document.getElementById('modelTable').innerHTML = data.models.map(m => `
                        <tr>
                            <td>${m.name}</td>
                            <td><code>${m.modelId}</code></td>
                            <td>${m.supportsQuality.join(', ')}</td>
                            <td>
                                <label class="switch">
                                    <input type="checkbox" ${m.enabled ? 'checked' : ''}
                                           onchange="toggleModel('${m.id}', this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('加载模型失败:', err);
            }
        }

        async function toggleModel(modelId, enabled) {
            const token = localStorage.getItem('adminToken');

            try {
                const res = await fetch(`/api/admin/models/${modelId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': token
                    },
                    body: JSON.stringify({ enabled })
                });

                const data = await res.json();
                if (!data.success) {
                    alert(data.message || '操作失败');
                }
            } catch (err) {
                alert('操作失败');
            }
        }

        // 检查登录状态
        if (localStorage.getItem('adminToken')) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        }
    </script>
</body>
</html>
