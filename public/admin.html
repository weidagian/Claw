    <script>
        function adminLogin() {
            const password = document.getElementById('password').value;

            if (password === 'admin2026') {
                localStorage.setItem('adminToken', 'admin_token');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else {
                alert('密码错误');
            }
        }

        function adminLogout() {
            localStorage.removeItem('adminToken');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }

        async function loadData() {
            const token = localStorage.getItem('adminToken');

            // 加载用户列表
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'X-Admin-Token': token }
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.users.length;
                    document.getElementById('userTable').innerHTML = data.users.map(u => `
                        <tr>
                            <td>${u.username}</td>
                            <td>${new Date(u.createdAt).toLocaleString()}</td>
                            <td>${new Date(u.lastLogin).toLocaleString()}</td>
                            <td>${u.usageCount}</td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('加载用户失败:', err);
            }

            // 加载模型列表
            try {
                const res = await fetch('/api/models');
                const data = await res.json();

                if (data.success) {
                    document.getElementById('modelTable').innerHTML = data.models.map(m => `
                        <tr>
                            <td>${m.name}</td>
                            <td><code>${m.modelId}</code></td>
                            <td>${m.supportsQuality.join(', ')}</td>
                            <td>
                                <label class="switch">
                                    <input type="checkbox" ${m.enabled ? 'checked' : ''}
                                           onchange="toggleModel('${m.id}', this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('加载模型失败:', err);
            }
        }

        async function toggleModel(modelId, enabled) {
            const token = localStorage.getItem('adminToken');

            try {
                const res = await fetch(`/api/admin/models/${modelId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': token
                    },
                    body: JSON.stringify({ enabled })
                });

                const data = await res.json();
                if (!data.success) {
                    alert(data.message || '操作失败');
                }
            } catch (err) {
                alert('操作失败');
            }
        }

        // 检查登录状态
        if (localStorage.getItem('adminToken')) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        }
    </script>
