<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理后台 - 子问设计助手</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-page">
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-cog"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-title">管理后台</span>
                    <span class="logo-subtitle">子问设计助手</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="logoutBtn" title="退出">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="admin-content">
        <!-- 统计卡片 -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon" style="background: #DBEAFE; color: #3B82F6;">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="totalUsers">0</span>
                    <span class="stat-label">总用户</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #D1FAE5; color: #10B981;">
                    <i class="fas fa-image"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="totalGenerations">0</span>
                    <span class="stat-label">总生成</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #FEF3C7; color: #F59E0B;">
                    <i class="fas fa-calendar-day"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="todayGenerations">0</span>
                    <span class="stat-label">今日生成</span>
                </div>
            </div>
        </section>

        <!-- 用户列表 -->
        <section class="users-section">
            <div class="section-header">
                <h2><i class="fas fa-user-friends"></i> 用户列表</h2>
                <button class="btn-refresh" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="users-table-wrapper">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>用户</th>
                            <th>类型</th>
                            <th>积分</th>
                            <th>使用次数</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="6" class="empty-cell">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <div class="modal-header">
                <h3>管理员登录</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码">
                </div>
                <div class="error-message" id="loginError" style="display: none;"></div>
                <button class="btn-submit" id="loginBtn">
                    <span>登录</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/admin.js"></script>
</body>
</html>
