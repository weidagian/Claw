<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子问设计助手 - 室内设计师的谈单神器</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero {
            text-align: center;
            padding: 4rem 1rem;
            background: linear-gradient(180deg, #f0f9ff 0%, #fff 100%);
        }
        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #2563eb 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 2rem;
        }
        .hero-cta {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 2rem 0;
        }
        .feature-card {
            background: #fff;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.2s;
        }
        .feature-card:hover {
            transform: translateY(-4px);
        }
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .feature-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .feature-desc {
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">Z</div>
                <span>子问设计助手</span>
            </a>
            <nav class="nav">
                <a href="work.html" class="nav-link">开始创作</a>
                <a href="login.html" class="nav-link" id="loginLink">登录</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1 class="hero-title">室内设计师的谈单神器</h1>
            <p class="hero-subtitle">AI 智能生成室内效果图，助您快速出图，高效谈单</p>
            <div class="hero-cta">
                <a href="work.html?guest=1" class="btn btn-primary">立即体验</a>
                <a href="login.html" class="btn btn-secondary">账号登录</a>
            </div>
        </section>

        <section class="features">
            <div class="feature-card">
                <div class="feature-icon">🎨</div>
                <h3 class="feature-title">多种风格</h3>
                <p class="feature-desc">支持现代简约、北欧、新中式等多种风格</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">⚡</div>
                <h3 class="feature-title">快速出图</h3>
                <p class="feature-desc">AI 智能生成，几秒钟即可获得效果图</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📱</div>
                <h3 class="feature-title">移动友好</h3>
                <p class="feature-desc">支持手机、平板随时随地工作</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔒</div>
                <h3 class="feature-title">安全可靠</h3>
                <p class="feature-desc">数据本地存储，保护客户隐私</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 子问设计助手 版权所有</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // 检查登录状态
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (token && user.username) {
            document.getElementById('loginLink').textContent = user.username;
            document.getElementById('loginLink').href = 'work.html';
        }
    </script>
</body>
</html>
