<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>子问设计助手 - AI 智能室内设计</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="landing-page">
    <!-- Hero 区 -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <div class="hero-logo">
                <div class="logo-icon">
                    <i class="fas fa-home"></i>
                </div>
                <h1 class="logo-title">子问设计</h1>
                <p class="logo-subtitle">AI 智能室内设计助手</p>
            </div>
            
            <h2 class="hero-title">将您的线稿<br>变成精美效果图</h2>
            <p class="hero-desc">上传室内设计线稿，AI 智能生成多种风格效果图</p>
            
            <div class="hero-actions">
                <a href="login.html" class="btn-primary">
                    <i class="fas fa-rocket"></i>
                    <span>立即开始</span>
                </a>
                <a href="work.html?guest=1" class="btn-secondary">
                    <i class="fas fa-ghost"></i>
                    <span>先体验</span>
                </a>
            </div>
            
            <!-- 特性 -->
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-magic"></i>
                    </div>
                    <h3>AI 智能生成</h3>
                    <p>基于 AI 大模型，智能理解线稿内容</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-palette"></i>
                    </div>
                    <h3>多种风格</h3>
                    <p>支持现代、北欧、新中式等多种风格</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <h3>快速出图</h3>
                    <p>几秒钟内生成高质量效果图</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 使用流程 -->
    <section class="steps">
        <h2 class="section-title">使用流程</h2>
        <div class="steps-grid">
            <div class="step-item">
                <div class="step-num">1</div>
                <h3>上传线稿</h3>
                <p>上传室内设计手绘稿或 CAD 导出图</p>
            </div>
            <div class="step-item">
                <div class="step-num">2</div>
                <h3>选择风格</h3>
                <p>挑选喜欢的设计风格和空间类型</p>
            </div>
            <div class="step-item">
                <div class="step-num">3</div>
                <h3>AI 生成</h3>
                <p>AI 自动渲染，快速生成效果图</p>
            </div>
        </div>
    </section>

    <!-- 底部 -->
    <footer class="footer">
        <p>&copy; 2024 子问设计助手. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
