<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>子问设计助手 - AI 室内设计</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-home"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-title">子问设计</span>
                    <span class="logo-subtitle">AI 智能室内设计</span>
                </div>
            </div>
            <div class="header-right">
                <span id="userInfo" class="user-info"></span>
                <button id="logoutBtn" class="btn-icon" title="退出">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 上传区域 -->
        <section class="upload-section">
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <div class="upload-placeholder" id="uploadPlaceholder">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <p class="upload-text">点击上传或拖拽图片</p>
                    <p class="upload-hint">支持 JPG、PNG 格式</p>
                </div>
                <div class="upload-preview" id="uploadPreview" style="display: none;">
                    <img id="previewImage" src="" alt="预览">
                    <button class="btn-remove" id="removeImage">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- 参数设置 -->
        <section class="options-section">
            <!-- 设计风格 -->
            <div class="option-group">
                <label class="option-label">
                    <i class="fas fa-palette"></i>
                    <span>设计风格</span>
                </label>
                <div class="style-grid" id="styleGrid">
                    <button class="style-btn active" data-style="modern">现代简约</button>
                    <button class="style-btn" data-style="nordic">北欧风格</button>
                    <button class="style-btn" data-style="chinese">新中式</button>
                    <button class="style-btn" data-style="luxury">轻奢风格</button>
                    <button class="style-btn" data-style="industrial">工业风</button>
                    <button class="style-btn" data-style="japanese">日式风格</button>
                    <button class="style-btn" data-style="american">美式风格</button>
                    <button class="style-btn" data-style="european">欧式风格</button>
                </div>
            </div>

            <!-- 空间类型 -->
            <div class="option-group">
                <label class="option-label">
                    <i class="fas fa-door-open"></i>
                    <span>空间类型</span>
                </label>
                <div class="style-grid" id="spaceGrid">
                    <button class="style-btn" data-space="living">客厅</button>
                    <button class="style-btn" data-space="master">主卧</button>
                    <button class="style-btn" data-space="second">次卧</button>
                    <button class="style-btn" data-space="dining">餐厅</button>
                    <button class="style-btn" data-space="kitchen">厨房</button>
                    <button class="style-btn" data-space="bathroom">卫生间</button>
                    <button class="style-btn" data-space="study">书房</button>
                    <button class="style-btn" data-space="balcony">阳台</button>
                </div>
            </div>

            <!-- 画质选择 -->
            <div class="option-group">
                <label class="option-label">
                    <i class="fas fa-crown"></i>
                    <span>画质选择</span>
                </label>
                <div class="quality-tabs" id="qualityTabs">
                    <button class="quality-btn active" data-quality="fast">
                        <span class="quality-icon"><i class="fas fa-bolt"></i></span>
                        <span class="quality-name">标准</span>
                    </button>
                    <button class="quality-btn" data-quality="hd">
                        <span class="quality-icon"><i class="fas fa-star"></i></span>
                        <span class="quality-name">高清</span>
                    </button>
                    <button class="quality-btn" data-quality="pro">
                        <span class="quality-icon"><i class="fas fa-gem"></i></span>
                        <span class="quality-name">专业</span>
                    </button>
                </div>
            </div>

            <!-- 创意程度 -->
            <div class="option-group">
                <label class="option-label">
                    <i class="fas fa-lightbulb"></i>
                    <span>创意程度</span>
                    <span class="creativity-value" id="creativityValue">5</span>
                </label>
                <div class="creativity-slider">
                    <span class="slider-min">严格</span>
                    <input type="range" id="creativitySlider" min="1" max="10" value="5" class="slider">
                    <span class="slider-max">自由</span>
                </div>
                <p class="creativity-hint" id="creativityHint">平衡模式：保持线稿结构，适度添加装饰</p>
            </div>
        </section>

        <!-- 生成按钮 -->
        <section class="action-section">
            <button id="generateBtn" class="btn-generate">
                <span class="btn-content">
                    <i class="fas fa-magic"></i>
                    <span>开始生成</span>
                </span>
                <span class="btn-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>生成中...</span>
                </span>
            </button>
        </section>

        <!-- 结果展示 -->
        <section id="resultSection" class="result-section" style="display: none;">
            <div class="result-card">
                <div class="result-header">
                    <h3><i class="fas fa-check-circle"></i> 生成完成</h3>
                </div>
                <div class="result-image">
                    <img id="resultImage" src="" alt="生成结果">
                </div>
                <div class="result-actions">
                    <button id="downloadBtn" class="btn-action">
                        <i class="fas fa-download"></i>
                        <span>下载</span>
                    </button>
                    <button id="regenerateBtn" class="btn-action btn-action-primary">
                        <i class="fas fa-redo"></i>
                        <span>重新生成</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- 历史记录 -->
        <section id="historySection" class="history-section">
            <div class="section-header" id="historyHeader">
                <h3><i class="fas fa-history"></i> 历史记录</h3>
                <span id="historyCount" class="count-badge">0</span>
                <button class="btn-toggle" id="toggleHistory">
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
            <div class="history-list" id="historyList" style="display: none;">
                <p class="empty-text">暂无历史记录</p>
            </div>
        </section>
    </main>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <script src="js/main.js"></script>
</body>
</html>
