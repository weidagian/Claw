    <script>
        let currentImage = null;
        let userId = null;
        let isGuest = false;

        // 初始化
        async function init() {
            // 检查 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            isGuest = urlParams.get('guest') === '1';

            // 获取用户信息
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (!token && !isGuest) {
                window.location.href = 'login.html';
                return;
            }

            if (user.id) {
                userId = user.id;
                document.getElementById('userDisplay').textContent = user.username;
                document.getElementById('usageCount').textContent = user.usageCount || 0;
                loadHistory();
            }

            // 加载风格列表
            loadStyles();

            // 创意程度滑块
            document.getElementById('creativity').addEventListener('input', (e) => {
                document.getElementById('creativityValue').textContent = e.target.value + '/10';
            });
        }

        // 加载风格列表
        async function loadStyles() {
            try {
                const res = await fetch('/api/styles');
                const data = await res.json();

                if (data.success) {
                    const select = document.getElementById('styleSelect');
                    select.innerHTML = data.styles.map(s =>
                        `<option value="${s.id}">${s.name}</option>`
                    ).join('');
                }
            } catch (err) {
                console.error('加载风格失败:', err);
            }
        }

        // 上传处理
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFile);

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile({ target: { files: e.dataTransfer.files } });
            }
        });

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                currentImage = event.target.result;
                document.getElementById('previewImage').src = currentImage;
                document.getElementById('previewImage').style.display = 'block';
                uploadArea.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // 生成图片
        async function generate() {
            if (!currentImage) {
                alert('请先上传图片');
                return;
            }

            const style = document.getElementById('styleSelect').value;
            const quality = document.getElementById('qualitySelect').value;
            const creativity = document.getElementById('creativity').value;

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '生成中...';

            try {
                const res = await fetch('/api/draw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: currentImage,
                        style,
                        quality,
                        creativity,
                        userId
                    })
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('resultImage').src = data.result.url;
                    document.getElementById('resultArea').style.display = 'block';

                    // 更新使用次数
                    if (userId) {
                        const user = JSON.parse(localStorage.getItem('user') || '{}');
                        user.usageCount = (user.usageCount || 0) + 1;
                        localStorage.setItem('user', JSON.stringify(user));
                        document.getElementById('usageCount').textContent = user.usageCount;
                        loadHistory();
                    }
                } else {
                    alert(data.message || '生成失败');
                }
            } catch (err) {
                alert('生成失败，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '生成效果图';
            }
        }

        // 下载结果
        function downloadResult() {
            const img = document.getElementById('resultImage');
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'ziwen-design-' + Date.now() + '.jpg';
            link.click();
        }

        // 加载历史记录
        async function loadHistory() {
            if (!userId) return;

            try {
                const res = await fetch(`/api/history?userId=${userId}`);
                const data = await res.json();

                if (data.success && data.history.length) {
                    const list = document.getElementById('historyList');
                    list.innerHTML = data.history.slice(0, 10).map(h => `
                        <div class="history-item" onclick="showHistory('${h.resultUrl}')">
                            <img class="history-thumb" src="${h.resultUrl}" onerror="this.style.display='none'">
                            <div class="history-info">
                                <div>${h.style} - ${h.quality}</div>
                                <div class="time">${new Date(h.createdAt).toLocaleString()}</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('加载历史失败:', err);
            }
        }

        function showHistory(url) {
            document.getElementById('resultImage').src = url;
            document.getElementById('resultArea').style.display = 'block';
        }

        // AI 建议
        async function getAISuggestions() {
            try {
                const res = await fetch('/api/ai/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'ux' })
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('suggestionList').innerHTML = data.suggestions.map(s =>
                        `<div class="suggestion-item">${s}</div>`
                    ).join('');
                    document.getElementById('aiModal').classList.add('show');
                }
            } catch (err) {
                alert('获取建议失败');
            }
        }

        function closeModal() {
            document.getElementById('aiModal').classList.remove('show');
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        init();
    </script>
